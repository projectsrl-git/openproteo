<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenProteo — Docs</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script>(function(){try{var t=localStorage.getItem("op-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
    <style>
        .docs-layout { display: -webkit-flex; display: flex; gap: 26px; align-items: flex-start; }
        .docs-toc { -webkit-flex: 0 0 240px; flex: 0 0 240px; position: -webkit-sticky; position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow: auto; }
        .docs-toc a { display: block; padding: 3px 8px; border-radius: 5px; color: var(--ink-dim); text-decoration: none; font-size: 13px; }
        .docs-toc a:hover { background: var(--bg-raise); color: var(--ink); }
        .docs-toc a.lvl3 { padding-left: 20px; font-size: 12.5px; }
        .docs-body { -webkit-flex: 1; flex: 1; min-width: 0; }
        .docs-body h1 { margin-top: 6px; }
        .docs-body h2 { margin-top: 30px; border-bottom: 1px solid var(--line-soft); padding-bottom: 6px; }
        .docs-body h3 { margin-top: 22px; }
        .docs-body p, .docs-body li { line-height: 1.6; color: var(--ink-dim); }
        .docs-body code { font-family: var(--mono); font-size: 12.5px; background: var(--bg-raise); padding: 1px 5px; border-radius: 4px; color: var(--ink); }
        .docs-body pre { background: #0a0e16; border: 1px solid var(--line); border-radius: 6px; padding: 12px 14px; overflow: auto; }
        .docs-body pre code { background: none; padding: 0; color: #cdd9e5; font-size: 12.5px; line-height: 1.5; }
        .docs-body a { color: var(--accent); }
        .docs-body hr { border: none; border-top: 1px solid var(--line); margin: 26px 0; }
    </style>
</head>
<body>
<div class="topbar">
    <a class="brand" th:href="@{/}"><img th:src="@{/img/logo.svg}" alt="">OPENPROTEO</a>
    <span class="sub">Docs</span>
    <span class="spacer"></span>
    <span class="clock" id="clock"></span>
</div>

<div class="wrap" style="max-width:1180px">
    <div class="docs-layout">
        <nav class="docs-toc panel" style="padding:12px" id="toc"></nav>
        <div class="docs-body panel" style="padding:22px 26px" id="doc">Loading…</div>
    </div>
</div>

<script>
    var CTX = (function(){ var b=document.querySelector('.brand'); var h=b?b.getAttribute('href'):'/'; return h.charAt(h.length-1)==='/'?h:h+'/'; })();
    function tick() { document.getElementById('clock').textContent = new Date().toLocaleString('it-IT'); }
    tick(); setInterval(tick, 1000);

    var NL = String.fromCharCode(10), CR = String.fromCharCode(13);
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
    function inline(s){
        s = esc(s);
        s = s.replace(/`([^`]+)`/g, function(m,a){ return '<code>'+a+'</code>'; });
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/[\[]([^\]]+)[\]][\(]([^)]+)[\)]/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        return s;
    }
    function render(raw){
        var lines = String(raw).split(CR).join('').split(NL);
        var out = [], toc = [], i = 0, inCode = false, codeBuf = [], listType = null, listBuf = [];
        function closeList(){ if(listType){ out.push('<'+listType+'>'+listBuf.join('')+'</'+listType+'>'); listType=null; listBuf=[]; } }
        for (i = 0; i < lines.length; i++){
            var ln = lines[i];
            var fence = ln.replace(/\s+$/,'');
            if (fence.indexOf('```') === 0){
                if (inCode){ out.push('<pre><code>'+esc(codeBuf.join(NL))+'</code></pre>'); codeBuf=[]; inCode=false; }
                else { closeList(); inCode = true; }
                continue;
            }
            if (inCode){ codeBuf.push(ln); continue; }
            var h = ln.match(/^(#{1,6})\s+(.*)$/);
            if (h){ closeList(); var lvl=h[1].length, txt=h[2], id=slug(txt);
                out.push('<h'+lvl+' id="'+id+'">'+inline(txt)+'</h'+lvl+'>');
                if (lvl===2||lvl===3) toc.push({lvl:lvl, id:id, txt:txt});
                continue; }
            if (/^\s*(-{3,}|\*{3,})\s*$/.test(ln)){ closeList(); out.push('<hr>'); continue; }
            var ul = ln.match(/^\s*[-*]\s+(.*)$/);
            var ol = ln.match(/^\s*\d+\.\s+(.*)$/);
            if (ul){ if(listType&&listType!=='ul') closeList(); listType='ul'; listBuf.push('<li>'+inline(ul[1])+'</li>'); continue; }
            if (ol){ if(listType&&listType!=='ol') closeList(); listType='ol'; listBuf.push('<li>'+inline(ol[1])+'</li>'); continue; }
            if (ln.trim()===''){ closeList(); continue; }
            closeList();
            out.push('<p>'+inline(ln)+'</p>');
        }
        if (inCode) out.push('<pre><code>'+esc(codeBuf.join(NL))+'</code></pre>');
        closeList();
        return { html: out.join(NL), toc: toc };
    }

    fetch(CTX + 'USAGE.md').then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
        .then(function(md){
            var res = render(md);
            document.getElementById('doc').innerHTML = res.html;
            var t = res.toc.map(function(e){ return '<a class="lvl'+e.lvl+'" href="#'+e.id+'">'+esc(e.txt)+'</a>'; }).join('');
            document.getElementById('toc').innerHTML = t || '<span class="dim small">No sections</span>';
        })
        .catch(function(e){ document.getElementById('doc').innerHTML = '<p class="dim">Could not load USAGE.md ('+esc(String(e))+').</p>'; });
</script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
