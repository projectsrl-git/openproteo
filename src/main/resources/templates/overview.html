<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>OpenProteo — Operations</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script>(function(){try{var t=localStorage.getItem("op-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
    <style>
        .tiles { display:flex; flex-wrap:wrap; gap:10px; margin:14px 0 18px; }
        .tile { background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:10px 14px; min-width:96px; }
        .tile .n { font-size:22px; font-weight:700; }
        .tile .l { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); }
        .tile.run .n{color:var(--run)} .tile.ok .n{color:var(--ok)} .tile.fail .n{color:var(--fail)}
        .bar { display:flex; height:12px; border-radius:6px; overflow:hidden; background:var(--bg-raise); border:1px solid var(--line); min-width:140px; }
        .bar > span { display:block; height:100%; }
        .seg-run{background:var(--run)} .seg-ok{background:var(--ok)} .seg-fail{background:var(--fail)}
        .seg-abort{background:var(--accent)} .seg-other{background:#7a8699} .seg-none{background:transparent}
        .num { text-align:right; font-variant-numeric:tabular-nums; }
        .legend { font-size:11px; color:var(--ink-faint); margin:6px 0 0; }
        .legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin:0 4px 0 12px; vertical-align:middle; }
    </style>
</head>
<body>
<div class="topbar">
    <a class="brand" th:href="@{/}"><img th:src="@{/img/logo.svg}" alt="">OPENPROTEO</a>
    <span class="sub">Operations · live executions &amp; per-source rollup</span>
    <span class="spacer"></span>
    <span class="clock" id="clock"></span>
</div>

<div class="wrap">
    <h1>Operations <span class="dim small" id="genTs"></span></h1>
    <p class="page-sub">
        All executions in progress and a rollup of every feed by status.
        <a class="btn sm" th:href="@{/}">← Dashboard</a>
    </p>

    <div class="tiles" id="tiles"></div>

    <div class="panel">
        <h3 style="display:flex;align-items:center;justify-content:space-between">
            <span>Executions in progress <span class="dim" id="activeCount"></span></span>
            <span class="dim small">auto-refresh 3s</span>
        </h3>
        <div id="activeWrap"><div class="dim small">Loading…</div></div>
    </div>

    <div class="panel">
        <h3 style="display:flex;align-items:center;justify-content:space-between">
            <span>By source</span>
            <button class="btn sm" onclick="loadRollup()">↻ Refresh</button>
        </h3>
        <div id="rollupWrap"><div class="dim small">Loading…</div></div>
        <p class="legend">
            <i class="seg-run"></i>running <i class="seg-ok"></i>success <i class="seg-fail"></i>failed
            <i class="seg-abort"></i>aborted <i class="seg-other"></i>other <i style="border:1px solid var(--line)"></i>not run
        </p>
    </div>
</div>

<script>
    var CTX = (function(){ var b=document.querySelector('.brand'); var h=b?b.getAttribute('href'):'/'; return h.charAt(h.length-1)==='/'?h:h+'/'; })();
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function num(n){ return (n==null?0:n).toLocaleString(); }

    (function clock(){ var c=document.getElementById('clock'); function t(){ if(c) c.textContent=new Date().toLocaleString(); } t(); setInterval(t,1000); })();

    function readJson(r){ return r.json(); }

    // ---------- live executions ----------
    function statusChip(st){ return '<span class="chip sm ' + esc(st) + '">' + esc(st) + '</span>'; }

    function renderActive(j){
        var rows = (j && j.running) || [];
        document.getElementById('activeCount').textContent = '· ' + rows.length;
        if (rows.length === 0){ document.getElementById('activeWrap').innerHTML = '<div class="dim small">No executions in progress.</div>'; return; }
        var h = '<table class="grid"><thead><tr>' +
            '<th>Feed</th><th>Source</th><th>Status</th><th>Progress</th><th>Started</th><th>Trigger</th><th></th>' +
            '</tr></thead><tbody>';
        for (var i=0;i<rows.length;i++){
            var r = rows[i];
            var prog = (r.totalSteps ? (r.doneSteps + '/' + r.totalSteps + ' steps') : '');
            if (r.currentStep) prog += (prog ? ' · ' : '') + 'now: ' + esc(r.currentStep);
            var srcLabel = esc(r.source || '—') + (r.sourceDescription ? ' <span class="dim">— ' + esc(r.sourceDescription) + '</span>' : '');
            h += '<tr>' +
                '<td><span class="mono feed-id">' + esc(r.feedId) + '</span><div class="dim small">' + esc(r.name||'') + '</div></td>' +
                '<td class="mono small dim">' + srcLabel + '</td>' +
                '<td>' + statusChip(r.status) + '</td>' +
                '<td class="small">' + prog + '</td>' +
                '<td class="mono small dim">' + esc(r.startTs||'') + '</td>' +
                '<td class="small dim">' + esc(r.trigger||'') + (r.by? ' ('+esc(r.by)+')':'') + '</td>' +
                '<td style="white-space:nowrap">' +
                    '<a class="btn sm" href="' + CTX + 'run/' + encodeURIComponent(r.feedId) + '/' + encodeURIComponent(r.runId) + '">Open</a> ' +
                    '<button class="btn sm danger" onclick="stopRun(this,\'' + esc(r.feedId) + '\',\'' + esc(r.runId) + '\')">■ Stop</button>' +
                '</td></tr>';
        }
        h += '</tbody></table>';
        document.getElementById('activeWrap').innerHTML = h;
    }

    function loadActive(){
        fetch(CTX + 'api/overview/active').then(readJson).then(function(j){
            renderActive(j);
            document.getElementById('genTs').textContent = '· updated ' + new Date().toLocaleTimeString();
        }).catch(function(){});
    }

    function stopRun(btn, feedId, runId){
        if (btn) { btn.disabled = true; btn.textContent = 'Stopping…'; }
        fetch(CTX + 'api/runs/' + encodeURIComponent(feedId) + '/' + encodeURIComponent(runId) + '/stop', { method:'POST' })
            .then(readJson).then(function(){ setTimeout(loadActive, 400); })
            .catch(function(){ if (btn){ btn.disabled=false; btn.textContent='■ Stop'; } });
    }

    // ---------- per-source rollup ----------
    function seg(cls, n, total, label){
        if (!n) return '';
        var w = total>0 ? (n*100.0/total) : 0;
        return '<span class="' + cls + '" style="width:' + w + '%" title="' + label + ': ' + n + '"></span>';
    }
    function renderRollup(j){
        var sources = (j && j.sources) || [];
        var t = (j && j.totals) || {};
        // tiles
        var tiles = [
            ['', 'Feeds', t.total], ['run','Running', t.running], ['ok','Success', t.success],
            ['fail','Failed', t.failed], ['','Not run', t.notRun], ['','Aborted', t.aborted], ['','Other', t.other]
        ];
        var th = '';
        for (var k=0;k<tiles.length;k++){
            th += '<div class="tile ' + tiles[k][0] + '"><div class="n">' + num(tiles[k][2]) + '</div><div class="l">' + tiles[k][1] + '</div></div>';
        }
        document.getElementById('tiles').innerHTML = th;

        if (sources.length === 0){ document.getElementById('rollupWrap').innerHTML = '<div class="dim small">No feeds.</div>'; return; }
        var h = '<table class="grid"><thead><tr>' +
            '<th>Source</th><th class="num">Total</th><th class="num">Not run</th><th class="num">Running</th>' +
            '<th class="num">Success</th><th class="num">Failed</th><th class="num">Aborted</th><th class="num">Other</th><th>Mix</th>' +
            '</tr></thead><tbody>';
        for (var i=0;i<sources.length;i++){
            var s = sources[i];
            var bar = '<div class="bar">' +
                seg('seg-run', s.running, s.total, 'running') +
                seg('seg-ok', s.success, s.total, 'success') +
                seg('seg-fail', s.failed, s.total, 'failed') +
                seg('seg-abort', s.aborted, s.total, 'aborted') +
                seg('seg-other', s.other, s.total, 'other') +
                '</div>';
            var srcLabel = '<span class="mono">' + esc(s.source) + '</span>' + (s.sourceDescription ? '<div class="dim small">' + esc(s.sourceDescription) + '</div>' : '');
            h += '<tr>' +
                '<td>' + srcLabel + '</td>' +
                '<td class="num">' + num(s.total) + '</td>' +
                '<td class="num dim">' + num(s.notRun) + '</td>' +
                '<td class="num" style="color:var(--run)">' + num(s.running) + '</td>' +
                '<td class="num" style="color:var(--ok)">' + num(s.success) + '</td>' +
                '<td class="num" style="color:var(--fail)">' + num(s.failed) + '</td>' +
                '<td class="num dim">' + num(s.aborted) + '</td>' +
                '<td class="num dim">' + num(s.other) + '</td>' +
                '<td>' + bar + '</td></tr>';
        }
        h += '</tbody></table>';
        document.getElementById('rollupWrap').innerHTML = h;
    }
    function loadRollup(){
        fetch(CTX + 'api/overview/rollup').then(readJson).then(renderRollup).catch(function(){});
    }

    loadActive(); setInterval(loadActive, 3000);
    loadRollup(); setInterval(loadRollup, 20000);
</script>
</body>
</html>
