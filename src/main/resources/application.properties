# OpenProteo — orchestratore feed Legal Archive
server.port=8080
spring.application.name=openproteo

spring.thymeleaf.cache=true
spring.jackson.serialization.indent-output=false

# Directory delle definizioni workflow (XML)
orchestrator.workflows-dir=./workflows
# Directory base degli script PowerShell (per path relativi)
orchestrator.scripts-dir=./scripts
# Base directory di default dei feed (sovrascrivibile per workflow con baseDir)
orchestrator.default-base-dir=./feeds
# Eseguibile PowerShell (pwsh.exe per PowerShell 7)
orchestrator.powershell-exe=powershell.exe
# Timeout di default per step (secondi)
orchestrator.default-step-timeout-sec=1800
# Guardia anti-loop nei gate
orchestrator.max-transitions=500

# ---------------------------------------------------------------- logging
# Log applicativo su file nella directory ./logs accanto al JAR, con rotazione.
# Livello verboso per la fase di sviluppo: abbassare com.legalarchive a INFO
# quando si va in produzione.
logging.file.name=./logs/openproteo.log
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=300MB
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%15.15t] %-40.40logger{39} : %m%n

logging.level.root=INFO
logging.level.com.legalarchive=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=INFO

# Upload (file di riferimento / descrittori json caricati per feed)
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# --- anonymize (ARX) preflight thresholds (Batch 1) ---
# orchestrator.anonymize-max-rows=5000000
